<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Psicrométrica | Profesional V3.1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Eliminar flechas de subir/bajar en inputs numéricos */
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }

  body {
    font-family: 'Outfit', sans-serif;
    /* Fondo plomo oscuro eléctrico */
    background: #1a1d24;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 20px;
    color: #e2e8f0;
    overflow-x: hidden;
    position: relative;
  }

  /* Animación de ondas sutiles en el fondo */
  body::before, body::after {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    top: -50%;
    left: -50%;
    z-index: -1;
    background: repeating-linear-gradient(
      60deg,
      transparent,
      transparent 10px,
      rgba(30, 34, 43, 0.5) 10px,
      rgba(30, 34, 43, 0.5) 20px
    );
    opacity: 0.15;
    animation: flow 15s linear infinite;
  }
  body::after {
    background: repeating-linear-gradient(
      -60deg,
      transparent,
      transparent 10px,
      rgba(43, 48, 60, 0.5) 10px,
      rgba(43, 48, 60, 0.5) 20px
    );
    animation-delay: -7s;
  }
  @keyframes flow {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }

  .app-container {
    background: #272d38; /* Plomo medio */
    border: 1px solid #3f4859;
    border-radius: 35px;
    padding: 25px 45px 45px 45px;
    width: 100%;
    max-width: 550px;
    margin: auto;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
    position: relative;
    z-index: 1;
  }

  .header { 
    text-align: center; 
    margin-bottom: 25px; 
    padding: 0; 
  }
  
  .header img {
    height: 300px; 
    max-width: 100%;
    object-fit: contain;
    margin-top: -35px; 
    margin-bottom: 10px;
    /* Iluminación blanca suave y difusa */
    filter: drop-shadow(0 0 12px rgba(255, 255, 255, 0.35)) drop-shadow(0 0 25px rgba(255, 255, 255, 0.1)); 
    transition: transform 0.3s ease, filter 0.3s ease;
  }

  .header img:hover { 
    transform: scale(1.03); 
    filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.5)) drop-shadow(0 0 35px rgba(255, 255, 255, 0.2));
  }

  h2 { font-weight: 700; font-size: 1.9rem; letter-spacing: -0.5px; margin-bottom: 5px; color: #ffffff; }

  .toggle-container {
    display: flex;
    background: #1a1d24;
    border-radius: 20px;
    padding: 6px;
    margin-bottom: 30px;
    box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
  }

  .toggle-btn {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    border-radius: 15px;
    font-weight: 500;
    color: #94a3b8;
    transition: all 0.3s ease;
    font-size: 0.9rem;
  }

  .toggle-btn.active {
    background: #3f4859;
    color: #ffffff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .input-wrapper {
    background: #1e222b;
    border: 1px solid #3f4859;
    border-radius: 18px;
    padding: 15px 25px;
    margin-bottom: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .input-wrapper label { font-size: 0.95rem; color: #cbd5e1; }
  
  .input-wrapper input {
    background: transparent;
    border: none;
    color: #38bdf8; /* Azul eléctrico para entradas */
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
    text-align: right;
    width: 110px;
    outline: none;
  }

  /* BOTÓN EN COLOR VERDE */
  .action-btn {
    width: 100%;
    padding: 18px;
    margin-top: 10px;
    background: #10b981; /* Verde esmeralda profesional */
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(16, 185, 129, 0.25);
    transition: all 0.3s ease;
  }

  .action-btn:hover { 
    transform: translateY(-3px); 
    background: #059669; /* Verde más intenso al pasar el mouse */
    box-shadow: 0 12px 25px rgba(16, 185, 129, 0.4);
  }

  .result-card {
    margin-top: 25px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .result-item {
    background: #1e222b;
    border: 1px solid #3f4859;
    border-radius: 22px;
    padding: 20px 10px;
    text-align: center;
  }

  .result-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }

  /* RESULTADOS EN COLOR AMARILLO LOGO SALASMET */
  .result-value { 
    font-size: 2.1rem; 
    font-weight: 700; 
    color: #FFCC00; /* Amarillo Logo SalasMet */
    text-shadow: 0 0 10px rgba(255, 204, 0, 0.25);
  }

  footer { margin-top: 30px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }

  /* --- CALCULADORA --- */
  .floating-btn {
    position: fixed; bottom: 30px; right: 30px;
    width: 65px; height: 65px;
    background: #272d38;
    border: 1px solid #3f4859;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 1000;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    transition: transform 0.3s ease, background 0.3s ease;
  }

  .floating-btn:hover { transform: scale(1.05); background: #3f4859; }

  .calc-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(10, 15, 25, 0.8); 
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    justify-content: center; align-items: center; z-index: 2000;
  }

  .calc-container {
    background: #272d38;
    border: 1px solid #3f4859;
    box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    padding: 30px; border-radius: 35px; width: 320px;
  }

  .calc-display { text-align: right; font-size: 2.5rem; font-weight: 300; padding: 10px 10px 20px; color: #ffffff; min-height: 70px; }
  .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .calc-buttons button { height: 60px; border: none; border-radius: 50%; font-size: 1.3rem; background: #1e222b; color: #ffffff; cursor: pointer; font-weight: 500; transition: background 0.2s;}
  .calc-buttons button:hover { background: #3f4859; }
  .calc-buttons .op { color: #38bdf8; font-weight: 700; }
  .calc-buttons .clear { color: #fb7185; font-weight: 700; }
  .calc-buttons .equal { background: #10b981; color: #ffffff; font-weight: 700; } 
  .calc-buttons .equal:hover { background: #059669; }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <img src="https://archive.org/download/salasmet_logo_transparente/salasmet_logo_transparente.png" alt="Logo SalasMet">
    <h2>Psicrometría</h2>
  </div>

  <div class="toggle-container">
    <div class="toggle-btn active" onclick="openTab('tab1', this)">Tº Seca + Tº Húmeda</div>
    <div class="toggle-btn" onclick="openTab('tab2', this)">Tº Seca + Tº Rocío</div>
  </div>

  <div id="tab1" class="tab-content active">
    <div class="input-wrapper"><label>Temp. Seca (°C)</label><input type="number" id="T1" step="0.1" value="15.2"></div>
    <div class="input-wrapper"><label>Temp. Húmeda (°C)</label><input type="number" id="Tw1" step="0.1" value="11.0"></div>
    <div class="input-wrapper"><label>Presión (hPa)</label><input type="number" id="P1" step="1" value="1013"></div>
    <button class="action-btn" onclick="calcularHR()">Calcular Resultados</button>
    <div class="result-card" id="resultado1" style="display:none;">
      <div class="result-item"><div class="result-label">Humedad</div><div class="result-value" id="val-hr1">--</div></div>
      <div class="result-item"><div class="result-label">Punto Rocío</div><div class="result-value" id="val-td1">--</div></div>
    </div>
  </div>

  <div id="tab2" class="tab-content">
    <div class="input-wrapper"><label>Temp. Seca (°C)</label><input type="number" id="T2" step="0.1" value="15.2"></div>
    <div class="input-wrapper"><label>Punto Rocío (°C)</label><input type="number" id="Td2" step="0.1" value="7.4"></div>
    <div class="input-wrapper"><label>Presión (hPa)</label><input type="number" id="P2" step="1" value="1013"></div>
    <button class="action-btn" onclick="calcularTwHR()">Calcular Resultados</button>
    <div class="result-card" id="resultado2" style="display:none;">
      <div class="result-item"><div class="result-label">T. Húmeda</div><div class="result-value" id="val-tw2">--</div></div>
      <div class="result-item"><div class="result-label">Humedad</div><div class="result-value" id="val-hr2">--</div></div>
    </div>
  </div>

  <footer>
    <div style="background: #1a1d24; padding: 6px 20px; border-radius: 12px; border: 1px solid #3f4859; display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 0.8rem; color: #94a3b8; letter-spacing: 1px; font-weight: 700;">VISITAS</span>
      <span id="visit-counter" style="font-size: 1.3rem; font-weight: 700; color: #38bdf8;">...</span>
    </div>
  </footer>
</div>

<div class="floating-btn" onclick="toggleCalc()">
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#e2e8f0" stroke-width="2">
    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
    <line x1="8" y1="6" x2="16" y2="6"></line>
    <circle cx="9" cy="11" r="1"></circle><circle cx="15" cy="11" r="1"></circle>
    <circle cx="9" cy="15" r="1"></circle><circle cx="15" cy="15" r="1"></circle>
    <circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="19" r="1"></circle>
  </svg>
</div>

<div class="calc-modal" id="calcModal">
  <div class="calc-container">
    <div id="calc-display" class="calc-display">0</div>
    <div class="calc-buttons">
      <button class="clear" onclick="clearCalc()">C</button>
      <button class="op" onclick="appendCalc('/')">÷</button>
      <button class="op" onclick="appendCalc('*')">×</button>
      <button class="op" onclick="appendCalc('-')">−</button>
      <button onclick="appendCalc('7')">7</button><button onclick="appendCalc('8')">8</button><button onclick="appendCalc('9')">9</button>
      <button class="op" onclick="appendCalc('+')">+</button>
      <button onclick="appendCalc('4')">4</button><button onclick="appendCalc('5')">5</button><button onclick="appendCalc('6')">6</button>
      <button class="equal" onclick="calculate()" style="grid-row: span 2; border-radius: 30px;">=</button>
      <button onclick="appendCalc('1')">1</button><button onclick="appendCalc('2')">2</button><button onclick="appendCalc('3')">3</button>
      <button onclick="appendCalc('0')" style="grid-column: span 2; border-radius: 30px;">0</button><button onclick="appendCalc('.')">.</button>
    </div>
  </div>
</div>

<script>
// Manejo de Pestañas
function openTab(tabId, element) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  element.classList.add('active');
}

// Fórmulas Meteorológicas
function e_s(T) { return 6.1094 * Math.exp((17.625 * T) / (T + 243.04)); }

function calcularHR() {
  const T = parseFloat(document.getElementById('T1').value);
  const Tw = parseFloat(document.getElementById('Tw1').value);
  const P = parseFloat(document.getElementById('P1').value);
  const es = e_s(T), ew = e_s(Tw);
  const HR = Math.max(0, Math.min(100, ((ew - 0.00066 * P * (T - Tw)) / es) * 100));
  const ln_e = Math.log(HR / 100 * es / 6.1094);
  const Td = (243.04 * ln_e) / (17.625 - ln_e);
  document.getElementById('resultado1').style.display = 'grid';
  document.getElementById('val-hr1').innerText = Math.round(HR) + '%';
  document.getElementById('val-td1').innerText = Td.toFixed(1) + '°';
}

function calcularTwHR() {
  const T = parseFloat(document.getElementById('T2').value), Td = parseFloat(document.getElementById('Td2').value), P = parseFloat(document.getElementById('P2').value);
  const es = e_s(T), e_actual = e_s(Td);
  let Tw = Td, diff = 1;
  for(let i=0; i<50 && Math.abs(diff)>0.0001; i++){
    let ew = e_s(Tw);
    let f = ew - 0.00066 * P * (T - Tw) - e_actual;
    let f_p = (17.625 * 243.04 / (243.04 + Tw)**2) * ew + 0.00066 * P;
    diff = f/f_p; Tw -= diff;
  }
  const HR = Math.max(0, Math.min(100, (e_actual/es)*100));
  document.getElementById('resultado2').style.display = 'grid';
  document.getElementById('val-tw2').innerText = Tw.toFixed(1) + '°';
  document.getElementById('val-hr2').innerText = Math.round(HR) + '%';
}

// Lógica Calculadora
let calcExp = "";
function toggleCalc() {
  const modal = document.getElementById("calcModal");
  modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
}
function appendCalc(v) {
  if(calcExp === "0" && v !== ".") calcExp = "";
  calcExp += v;
  document.getElementById("calc-display").innerText = calcExp;
}
function clearCalc() { calcExp = ""; document.getElementById("calc-display").innerText = "0"; }
function calculate() {
  try {
    let res = eval(calcExp.replace('×', '*').replace('÷', '/'));
    res = Math.round(res * 1000) / 1000;
    document.getElementById("calc-display").innerText = res;
    calcExp = res.toString();
  } catch { document.getElementById("calc-display").innerText = "Err"; calcExp = ""; }
}

// Soporte para teclado físico
document.addEventListener("keydown", function(e) {
  const modal = document.getElementById("calcModal");
  if (modal.style.display !== "flex") return; // Solo funciona si el modal está abierto

  if (e.key >= "0" && e.key <= "9") appendCalc(e.key);
  if (["+", "-", "*", "/"].includes(e.key)) appendCalc(e.key);
  if (e.key === ".") appendCalc(".");
  if (e.key === "Enter" || e.key === "=") { e.preventDefault(); calculate(); }
  if (e.key === "Backspace") { 
    calcExp = calcExp.slice(0, -1); 
    document.getElementById("calc-display").innerText = calcExp || "0"; 
  }
  if (e.key === "Escape") toggleCalc();
  if (e.key.toLowerCase() === "c") clearCalc();
});

// Cerrar calculadora al hacer clic fuera
document.getElementById("calcModal").addEventListener("click", e => { if(e.target.id === "calcModal") toggleCalc(); });

// Contador de Visitas
const WORKER_URL = 'https://contador-visitas.salaspancho16.workers.dev/';
fetch(WORKER_URL)
  .then(response => response.json())
  .then(data => { document.getElementById('visit-counter').innerText = data.visitas; })
  .catch(error => { document.getElementById('visit-counter').innerText = '---'; });
</script>
</body>
</html>
