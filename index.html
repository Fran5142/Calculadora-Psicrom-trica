<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Psicrométrica | Profesional V3.1</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* Eliminar flechas de subir/bajar en inputs numéricos */
  input::-webkit-outer-spin-button,
  input::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input[type=number] {
    -moz-appearance: textfield;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(45deg, #0f172a, #1e3a8a, #0891b2, #0f172a);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #ffffff;
    padding: 20px;
  }

  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .app-container {
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 35px;
    padding: 45px;
    width: 100%;
    max-width: 550px;
    box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    position: relative;
  }

  .header { text-align: center; margin-bottom: 35px; }
  
  /* Logo más grande */
  .header img {
    height: 200px; /* Aumentado de 80px */
    width: auto;
    margin-bottom: 20px;
    filter: drop-shadow(0 12px 20px rgba(0,0,0,0.4));
  }

  h2 { font-weight: 700; font-size: 2rem; letter-spacing: -0.5px; margin-bottom: 8px; }
  p.subtitle { color: rgba(255,255,255,0.6); font-weight: 300; font-size: 1rem; }

  .toggle-container {
    display: flex;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 20px;
    padding: 6px;
    margin-bottom: 35px;
  }

  .toggle-btn {
    flex: 1;
    padding: 14px;
    text-align: center;
    cursor: pointer;
    border-radius: 15px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    transition: all 0.3s ease;
  }

  .toggle-btn.active {
    background: rgba(255, 255, 255, 0.12);
    color: #fff;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.5s ease; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .input-wrapper {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    padding: 15px 25px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .input-wrapper label { font-size: 1rem; color: rgba(255,255,255,0.8); }
  
  .input-wrapper input {
    background: transparent;
    border: none;
    color: #38bdf8;
    font-size: 1.4rem;
    font-weight: 700;
    font-family: 'Outfit', sans-serif;
    text-align: right;
    width: 120px;
    outline: none;
  }

  .action-btn {
    width: 100%;
    padding: 18px;
    margin-top: 15px;
    background: linear-gradient(135deg, #0284c7, #38bdf8);
    color: white;
    border: none;
    border-radius: 18px;
    font-size: 1.2rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(2, 132, 199, 0.4);
    transition: all 0.3s ease;
  }

  .action-btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

  .result-card {
    margin-top: 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .result-item {
    background: rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 22px;
    padding: 25px 15px;
    text-align: center;
  }

  .result-label { font-size: 0.85rem; color: rgba(255,255,255,0.5); text-transform: uppercase; margin-bottom: 8px; }
  .result-value { font-size: 2.2rem; font-weight: 700; color: #fff; }

  /* Ajuste para acomodar el contador en el footer */
  footer { margin-top: 40px; text-align: center; font-size: 1.0rem; color: rgba(255,255,255,0.8); font-weight: 500; display: flex; flex-direction: column; align-items: center; gap: 15px; }

  /* --- CALCULADORA --- */
  .floating-btn {
    position: fixed; bottom: 40px; right: 40px;
    width: 70px; height: 70px;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 1000;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
  }

  .calc-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
    justify-content: center; align-items: center; z-index: 2000;
  }

  .calc-container {
    background: rgba(15, 20, 35, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px; border-radius: 35px; width: 340px;
  }

  .calc-display {
    text-align: right; font-size: 2.8rem; font-weight: 300;
    padding: 10px 10px 30px; color: #fff; min-height: 80px;
  }

  .calc-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

  .calc-buttons button {
    height: 65px; border: none; border-radius: 50%;
    font-size: 1.4rem; font-family: 'Outfit', sans-serif;
    background: rgba(255, 255, 255, 0.05); color: #fff;
    cursor: pointer; transition: 0.2s;
  }

  .calc-buttons button:hover { background: rgba(255, 255, 255, 0.15); }
  .calc-buttons .op { color: #38bdf8; }
  .calc-buttons .clear { color: #f43f5e; }
  .calc-buttons .equal { background: #38bdf8; color: #000; font-weight: 700; }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <img src="https://archive.org/download/imagen_mejorada_3D/LOGO%20METEOPMO.png" alt="Logo MeteoPMO">
    <h2>Psicrometría</h2>
    <p class="subtitle">Estación de Precisión</p>
  </div>

  <div class="toggle-container">
    <div class="toggle-btn active" onclick="openTab('tab1', this)">Tº Seca + Tº Húmeda</div>
    <div class="toggle-btn" onclick="openTab('tab2', this)">Tº Seca + Tº Punto de Rocío</div>
  </div>

  <div id="tab1" class="tab-content active">
    <div class="input-wrapper">
      <label>Temp. Seca (°C)</label>
      <input type="number" id="T1" step="0.1" value="15.2">
    </div>
    <div class="input-wrapper">
      <label>Temp. Húmeda (°C)</label>
      <input type="number" id="Tw1" step="0.1" value="11.0">
    </div>
    <div class="input-wrapper">
      <label>Presión (hPa)</label>
      <input type="number" id="P1" step="1" value="1013">
    </div>
    <button class="action-btn" onclick="calcularHR()">Calcular Resultados</button>
    <div class="result-card" id="resultado1" style="display:none;">
      <div class="result-item"><div class="result-label">Humedad Relativa</div><div class="result-value" id="val-hr1">--</div></div>
      <div class="result-item"><div class="result-label">Punto de Rocío</div><div class="result-value" id="val-td1">--</div></div>
    </div>
  </div>

  <div id="tab2" class="tab-content">
    <div class="input-wrapper">
      <label>Temp. Seca (°C)</label>
      <input type="number" id="T2" step="0.1" value="15.2">
    </div>
    <div class="input-wrapper">
      <label>Punto Rocío (°C)</label>
      <input type="number" id="Td2" step="0.1" value="7.4">
    </div>
    <div class="input-wrapper">
      <label>Presión (hPa)</label>
      <input type="number" id="P2" step="1" value="1013">
    </div>
    <button class="action-btn" onclick="calcularTwHR()">Calcular Resultados</button>
    <div class="result-card" id="resultado2" style="display:none;">
      <div class="result-item"><div class="result-label">Temp. Húmeda</div><div class="result-value" id="val-tw2">--</div></div>
      <div class="result-item"><div class="result-label">Humedad</div><div class="result-value" id="val-hr2">--</div></div>
    </div>
  </div>

  <footer>
    <span>Cabo 1º (MET.) Francisco Salas Muñoz</span>
    <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https://fran5142.github.io/Calculadora-Psicrom-trica/&count_bg=%2338BDF8&title_bg=%230F172A&icon=&icon_color=%23E7E7E7&title=VISITAS&edge_flat=true" alt="Contador de Visitas" style="border-radius: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">
  </footer>
</div>

<div class="floating-btn" onclick="toggleCalc()">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
    <rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect>
    <line x1="8" y1="6" x2="16" y2="6"></line>
    <circle cx="9" cy="11" r="1"></circle><circle cx="15" cy="11" r="1"></circle>
    <circle cx="9" cy="15" r="1"></circle><circle cx="15" cy="15" r="1"></circle>
    <circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="19" r="1"></circle>
  </svg>
</div>

<div class="calc-modal" id="calcModal">
  <div class="calc-container">
    <div id="calc-display" class="calc-display">0</div>
    <div class="calc-buttons">
      <button class="clear" onclick="clearCalc()">C</button>
      <button class="op" onclick="appendCalc('/')">÷</button>
      <button class="op" onclick="appendCalc('*')">×</button>
      <button class="op" onclick="appendCalc('-')">−</button>
      <button onclick="appendCalc('7')">7</button><button onclick="appendCalc('8')">8</button><button onclick="appendCalc('9')">9</button>
      <button class="op" onclick="appendCalc('+')">+</button>
      <button onclick="appendCalc('4')">4</button><button onclick="appendCalc('5')">5</button><button onclick="appendCalc('6')">6</button>
      <button class="equal" onclick="calculate()" style="grid-row: span 2; border-radius: 30px;">=</button>
      <button onclick="appendCalc('1')">1</button><button onclick="appendCalc('2')">2</button><button onclick="appendCalc('3')">3</button>
      <button onclick="appendCalc('0')" style="grid-column: span 2; border-radius: 30px;">0</button><button onclick="appendCalc('.')">.</button>
    </div>
  </div>
</div>

<script>
function openTab(tabId, element) {
  document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
  document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  element.classList.add('active');
}

function e_s(T) { return 6.1094 * Math.exp((17.625 * T) / (T + 243.04)); }

function calcularHR() {
  const T = parseFloat(document.getElementById('T1').value);
  const Tw = parseFloat(document.getElementById('Tw1').value);
  const P = parseFloat(document.getElementById('P1').value);
  const es = e_s(T), ew = e_s(Tw);
  const HR = Math.max(0, Math.min(100, ((ew - 0.00066 * P * (T - Tw)) / es) * 100));
  const ln_e = Math.log(HR / 100 * es / 6.1094);
  const Td = (243.04 * ln_e) / (17.625 - ln_e);
  document.getElementById('resultado1').style.display = 'grid';
  document.getElementById('val-hr1').innerText = Math.round(HR) + '%';
  document.getElementById('val-td1').innerText = Td.toFixed(1) + '°';
}

function calcularTwHR() {
  const T = parseFloat(document.getElementById('T2').value), Td = parseFloat(document.getElementById('Td2').value), P = parseFloat(document.getElementById('P2').value);
  const es = e_s(T), e_actual = e_s(Td);
  let Tw = Td, diff = 1;
  for(let i=0; i<50 && Math.abs(diff)>0.0001; i++){
    let ew = e_s(Tw);
    let f = ew - 0.00066 * P * (T - Tw) - e_actual;
    let f_p = (17.625 * 243.04 / (243.04 + Tw)**2) * ew + 0.00066 * P;
    diff = f/f_p; Tw -= diff;
  }
  const HR = Math.max(0, Math.min(100, (e_actual/es)*100));
  document.getElementById('resultado2').style.display = 'grid';
  document.getElementById('val-tw2').innerText = Tw.toFixed(1) + '°';
  document.getElementById('val-hr2').innerText = Math.round(HR) + '%';
}

/* --- LOGICA CALCULADORA --- */
let calcExp = "";
function toggleCalc() {
  const modal = document.getElementById("calcModal");
  modal.style.display = (modal.style.display === "flex") ? "none" : "flex";
}
function appendCalc(v) {
  if(calcExp === "0" && v !== ".") calcExp = "";
  calcExp += v;
  document.getElementById("calc-display").innerText = calcExp;
}
function clearCalc() { calcExp = ""; document.getElementById("calc-display").innerText = "0"; }
function calculate() {
  try {
    let res = eval(calcExp.replace('×', '*').replace('÷', '/'));
    res = Math.round(res * 1000) / 1000;
    document.getElementById("calc-display").innerText = res;
    calcExp = res.toString();
  } catch { document.getElementById("calc-display").innerText = "Err"; calcExp = ""; }
}

// FIX: Teclado de PC para Calculadora
document.addEventListener("keydown", function(e) {
  const modal = document.getElementById("calcModal");
  if (modal.style.display !== "flex") return;

  if (e.key >= "0" && e.key <= "9") appendCalc(e.key);
  if (["+", "-", "*", "/"].includes(e.key)) appendCalc(e.key);
  if (e.key === ".") appendCalc(".");
  if (e.key === "Enter") { e.preventDefault(); calculate(); }
  if (e.key === "Backspace") {
    calcExp = calcExp.slice(0, -1);
    document.getElementById("calc-display").innerText = calcExp || "0";
  }
  if (e.key === "Escape") toggleCalc();
});

document.getElementById("calcModal").addEventListener("click", e => { if(e.target.id === "calcModal") toggleCalc(); });
</script>
</body>
</html>
